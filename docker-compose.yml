version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - file_storage:/app/storage
    environment:
      DATABASE_URL: postgresql://gridflow:gridflow@postgres:5432/gridflow
      FILE_STORAGE_PATH: /app/storage/files
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gridflow
      POSTGRES_PASSWORD: gridflow
      POSTGRES_DB: gridflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  file_storage:
